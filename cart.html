<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Shop - Trendy Fashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .product-card { transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .cart-badge { font-size: 0.8rem; }
        .hero { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); color: white; }
        .nav-tabs .nav-link.active { background-color: #ff6b6b; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark shadow-lg">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-crown me-2"></i>Prime Shop</a>
            <button class="btn btn-primary position-relative" data-bs-toggle="modal" data-bs-target="#cartModal">
                <i class="fas fa-shopping-cart"></i> Cart
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger cart-badge" id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <div class="hero py-5 text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Welcome to Prime Shop</h1>
            <p class="lead">Discover the latest trends in girls' and boys' fashion!</p>
        </div>
    </div>

    <div class="container my-5">
        <ul class="nav nav-tabs justify-content-center mb-4" id="categoryTabs">
            <li class="nav-item">
                <button class="nav-link active" data-category="girls">👗 Girls' Fashion</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-category="boys">👕 Boys' Fashion</button>
            </li>
        </ul>

        <div class="row" id="products"></div>
    </div>

    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title"><i class="fas fa-shopping-cart me-2"></i>Your Cart</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="cartItems">
                    <p class="text-center text-muted">Your cart is empty</p>
                </div>
                <div class="modal-footer flex-column">
                    <div class="w-100 d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">Total:</h4>
                        <h4 class="mb-0 text-primary" id="cartTotal">$0.00</h4>
                    </div>
                    <button class="btn btn-danger w-100 mb-2" id="clearCart">Clear Cart</button>
                    <button class="btn btn-success btn-lg w-100" id="checkoutBtn">Checkout</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const products = {
            girls: [
                { id: 1, name: "Summer Dress", price: 49.99, img: "https://i.ytimg.com/vi/Vjgx5gZ_F2Q/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLAgZhqpXaDH8Pxhn-d8idjWeZ6hmQ", category: "girls" },
                { id: 2, name: "Stylish Outfit Set", price: 79.99, img: "https://img.freepik.com/premium-photo/teen-girl-style-clothes-teen-girl-fashion-summer-style-outfit-teen-girl-summer-style-clothing-enjoying-weather-teen-girl-summer-style-posing-summer-fashion_474717-153947.jpg", category: "girls" },
                { id: 3, name: "Casual Teen Look", price: 59.99, img: "https://www.shutterstock.com/image-photo/fashion-style-teen-stylish-outfit-260nw-2518363025.jpg", category: "girls" },
                { id: 4, name: "Elegant City Dress", price: 89.99, img: "https://lux-life.digital/wp-content/uploads/2023/07/a-teenage-girl-walks-in-the-city-in-a-dress-and-ja-2023-07-01-00-53-03-utc1-1.jpg", category: "girls" },
                { id: 5, name: "Trendy Top & Jeans", price: 69.99, img: "https://hips.hearstapps.com/hmg-prod/images/best-teen-stores-1643381706.jpg?crop=0.6666666666666666xw:1xh;center,top&resize=1200:*", category: "girls" },
                { id: 6, name: "Leather Jacket Outfit", price: 99.99, img: "https://img.freepik.com/premium-photo/teen-fashion-girl-trendy-stylish-teenager-girl-fashion-style-teen-stylish-outfit-fall-style-stylish-girl-casual-leather-jacket-teen-girl-wear-casual-style-outdoor-trendy-spring_474717-181206.jpg", category: "girls" },
                { id: 7, name: "Cute Bag & Charms", price: 39.99, img: "https://www.hollywoodreporter.com/wp-content/uploads/2024/12/From-Celeb-Loved-Bags-to-22It22-Girl-Charm-Necklaces-Here-Are-the-Best-Coach-Accessories-for-Every-Occasion-MAIN.jpg?w=1296&h=730&crop=1", category: "girls" },
                { id: 8, name: "Fashion Jewelry Set", price: 29.99, img: "https://media.glamourmagazine.co.uk/photos/66b383bb3282685ac3a3c4ab/16:9/w_2560%2Cc_limit/CPH%2520MICROTREND%2520CHARMS%2520070824%2520default-GettyImages-2165423262.jpg", category: "girls" },
                { id: 9, name: "Kawaii Shoulder Bag", price: 34.99, img: "https://m.media-amazon.com/images/I/41yIRIUPLYL._AC_UY1000_.jpg", category: "girls" }
            ],
            boys: [
                { id: 10, name: "Casual Street Outfit", price: 69.99, img: "https://i.etsystatic.com/46231739/r/il/de3b71/5503174821/il_570xN.5503174821_fc0j.jpg", category: "boys" },
                { id: 11, name: "Cool Teen Style", price: 59.99, img: "https://i.ytimg.com/vi/0f8bmGwit6s/sddefault.jpg", category: "boys" },
                { id: 12, name: "Spring Capsule Look", price: 89.99, img: "https://themomedit.com/wp-content/uploads/2021/04/young-teen-capsule-wardrobe.jpg", category: "boys" },
                { id: 13, name: "High School Outfit", price: 49.99, img: "https://i.pinimg.com/736x/75/42/68/754268490bdf8cf0e38e76d666f7918f.jpg", category: "boys" },
                { id: 14, name: "Modern Casual Set", price: 79.99, img: "https://i.etsystatic.com/46231739/r/il/6075a2/5364546034/il_570xN.5364546034_5gv8.jpg", category: "boys" },
                { id: 15, name: "Trendy Guy Look", price: 64.99, img: "https://dress-trends.com/wp-content/uploads/2021/12/fashion-for-teenage-guys-2022-2-%E2%80%94-%D0%BA%D0%BE%D0%BF%D0%B8%D1%8F-%E2%80%94-%D0%BA%D0%BE%D0%BF%D0%B8%D1%8F.jpg", category: "boys" },
                { id: 16, name: "Stylish Watch", price: 99.99, img: "https://nextluxury.com/wp-content/uploads/Top-15-Fashion-Accessories-For-Men-1.jpg", category: "boys" },
                { id: 17, name: "Cool Cap Collection", price: 24.99, img: "https://nextluxury.com/wp-content/uploads/Hats-Fashion-Accessories-For-Men.jpg", category: "boys" },
                { id: 18, name: "Sneakers & Accessories", price: 119.99, img: "https://m.media-amazon.com/images/S/aplus-media-library-service-media/8baa0ec8-37ad-405c-9816-a2faf0f422f5.__CR0,0,970,600_PT0_SX970_V1___.jpg", category: "boys" }
            ]
        };

        let cart = JSON.parse(localStorage.getItem('primeCart')) || [];
        let currentCategory = 'girls';

        function renderProducts() {
            const container = document.getElementById('products');
            const items = products[currentCategory];
            container.innerHTML = items.map(p => `
                <div class="col-md-4 mb-4">
                    <div class="card product-card h-100 shadow-sm">
                        <img src="${p.img}" class="card-img-top" alt="${p.name}" style="height: 300px; object-fit: cover;">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${p.name}</h5>
                            <p class="card-text mt-auto"><strong>$${p.price.toFixed(2)}</strong></p>
                            <button class="btn btn-primary mt-2 add-to-cart" data-id="${p.id}">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', addToCart);
            });
        }

        document.querySelectorAll('[data-category]').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('[data-category]').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentCategory = tab.dataset.category;
                renderProducts();
            });
        });

        function addToCart(e) {
            const id = parseInt(e.target.dataset.id);
            const allProducts = [...products.girls, ...products.boys];
            const product = allProducts.find(p => p.id === id);
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            saveCart();
            updateCartUI();
        }

        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            const totalEl = document.getElementById('cartTotal');

            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-center text-muted">Your cart is empty</p>';
                totalEl.textContent = '$0.00';
                return;
            }

            cartItems.innerHTML = cart.map(item => `
                <div class="d-flex align-items-center mb-3 pb-3 border-bottom">
                    <img src="${item.img}" alt="${item.name}" class="rounded me-3" style="width: 80px; height: 80px; object-fit: cover;">
                    <div class="flex-grow-1">
                        <h6 class="mb-1">${item.name}</h6>
                        <small class="text-muted">${item.category === 'girls' ? '👗 Girls' : '👕 Boys'}</small>
                        <p class="mb-0">$${item.price.toFixed(2)} each</p>
                    </div>
                    <div class="d-flex align-items-center">
                        <button class="btn btn-sm btn-outline-secondary decrease" data-id="${item.id}">-</button>
                        <span class="mx-3 fw-bold">${item.quantity}</span>
                        <button class="btn btn-sm btn-outline-secondary increase" data-id="${item.id}">+</button>
                    </div>
                    <button class="btn btn-sm btn-danger ms-3 remove-item" data-id="${item.id}"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            totalEl.textContent = `$${total.toFixed(2)}`;

            document.querySelectorAll('.increase').forEach(btn => btn.addEventListener('click', changeQuantity));
            document.querySelectorAll('.decrease').forEach(btn => btn.addEventListener('click', changeQuantity));
            document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', removeFromCart));
        }

        function changeQuantity(e) {
            const id = parseInt(e.target.dataset.id);
            const item = cart.find(i => i.id === id);
            if (e.target.classList.contains('increase')) {
                item.quantity += 1;
            } else if (item.quantity > 1) {
                item.quantity -= 1;
            }
            saveCart();
            renderCart();
            updateCartUI();
        }

        function removeFromCart(e) {
            const id = parseInt(e.target.closest('.remove-item').dataset.id);
            cart = cart.filter(i => i.id !== id);
            saveCart();
            renderCart();
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function saveCart() {
            localStorage.setItem('primeCart', JSON.stringify(cart));
        }

        document.getElementById('clearCart').addEventListener('click', () => {
            cart = [];
            saveCart();
            renderCart();
            updateCartUI();
        });

        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (cart.length === 0) return;
            alert('🎉 Thank you for shopping at Prime Shop! Total: ' + document.getElementById('cartTotal').textContent);
            cart = [];
            saveCart();
            renderCart();
            updateCartUI();
            bootstrap.Modal.getInstance(document.getElementById('cartModal')).hide();
        });

        const cartModal = document.getElementById('cartModal');
        cartModal.addEventListener('show.bs.modal', renderCart);

        renderProducts();
        updateCartUI();
    </script>
</body>
</html>
